services:
  # ─── PHP + FrankenPHP ───────────────────────────────────
  php:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile
      target: dev
    ports:
      - "80:80"
    volumes:
      - .:/app
      - php_socket:/var/run/php
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-!ChangeMe!}@database:3306/${MYSQL_DATABASE:-symfony}?serverVersion=${MYSQL_VERSION:-8.4}&charset=utf8mb4
      MESSENGER_TRANSPORT_DSN: amqp://guest:guest@rabbitmq:5672/%2f/messages
      MAILER_DSN: smtp://mailer:1025
      REDIS_URL: redis://redis:6379
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── MySQL ──────────────────────────────────────────────
  database:
    image: mysql:${MYSQL_VERSION:-8.4}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-symfony}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-!ChangeMe!}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  # ─── RabbitMQ ───────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ─── Mailpit ───────────────────────────────────────────
  mailer:
    image: axllent/mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  php_socket:
  mysql_data:
  redis_data:
  rabbitmq_data:
