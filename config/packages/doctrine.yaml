doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
        types:
            match_id:
                class: App\Match\Infrastructure\Persistence\Type\MatchIdType
            team_id:
                class: App\Match\Infrastructure\Persistence\Type\TeamIdType
            league_id:
                class: App\Match\Infrastructure\Persistence\Type\LeagueIdType
            prediction_id:
                class: App\Betting\Infrastructure\Persistence\Type\PredictionIdType
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: false
        mappings:
            Match:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Match/Domain/Entity'
                prefix: 'App\Match\Domain\Entity'
                alias: Match
            User:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/User/Domain/Entity'
                prefix: 'App\User\Domain\Entity'
                alias: User
            Betting:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Betting/Domain/Entity'
                prefix: 'App\Betting\Domain\Entity'
                alias: Betting
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
