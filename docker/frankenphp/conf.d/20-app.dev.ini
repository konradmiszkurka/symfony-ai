; Dev PHP configuration
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 60

; Opcache — disabled in dev for live reload
opcache.enable = 0

; Realpath cache
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Error reporting
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
